<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport"
    content="width=device-width, initial-scale=1.0">

    <title>Magical Utilities</title>

    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css"
    rel="stylesheet">
    <link href="https://fonts.googleapis.com/css2?family=Cinzel&family=Poppins&display=swap"
    rel="stylesheet">
    <link rel="stylesheet" href="style.css">
</head>

<body>
    <div class="container calculator-section">

    <h1 class="text-center page-title">
        📏 Measurement Transfiguration
    </h1>

    <div class="calculator-card">
        <label>Enter Value</label>
        <input type="number"
        id="value"
        class="form-control"><br>

        <label>Select Conversion</label>
        <select id="conversion"
        class="form-control">
            <option value="cmToM">
                Centimeter → Meter
            </option>
            <option value="mToCm">
                Meter → Centimeter
            </option>
        </select><br>

        <div class="text-center">
            <button onclick="convertMeasurement()"
            class="btn custom-btn">
                Convert
            </button>
        </div><br>

        <h3 id="result"
        class="text-center">
            Result: --
        </h3><br>
    </div>
</div>

<script src="js/converter.js"></script>

<div class="text-center mt-4">
    <a href="tools.html"
    class="btn custom-btn">
        ⬅ Return to Magical Utilities
    </a>
</div>

<script src="converter.js"></script>

</body>
</html>
