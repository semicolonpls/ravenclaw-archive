<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport"
    content="width=device-width, initial-scale=1.0">

    <title>Magical Utilities</title>

    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css"
    rel="stylesheet">
    <link href="https://fonts.googleapis.com/css2?family=Cinzel&family=Poppins&display=swap"
    rel="stylesheet">
    <link rel="stylesheet" href="style.css">
</head>

<body>
    <div class="container calculator-section">

    <h1 class="text-center page-title">
        🧮 Arithmancy Calculator
    </h1>

    <div class="calculator-card">

        <label>First Number</label>
        <input type="number"
        id="num1"
        class="form-control"><br>

        <label>Second Number</label>
        <input type="number"
        id="num2"
        class="form-control"><br>

        <div class="text-center">

            <button onclick="add()"
            class="btn custom-btn">
                Add
            </button>

            <button onclick="subtract()"
            class="btn custom-btn">
                Subtract
            </button>

            <button onclick="multiply()"
            class="btn custom-btn">
                Multiply
            </button>

            <button onclick="divide()"
            class="btn custom-btn">
                Divide
            </button>

        </div><br>

        <h3 id="result"
        class="text-center">
            Result: --
        </h3>
    </div>
</div>

<div class="text-center mt-4">
    <a href="tools.html"
    class="btn custom-btn">
        ⬅ Return to Magical Utilities
    </a>
</div>

<script src="calculator.js"></script>

</body>
</html>
